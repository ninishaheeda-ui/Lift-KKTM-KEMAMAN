<!DOCTYPE html>
<html>
<head>
    <title>Lift KKTM Kemaman</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #f5f5f5;
        }

        h1 {
            margin-top: 40px;
        }

        button {
            width: 180px;
            height: 50px;
            margin: 10px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <h1>Lift KKTM Kemaman</h1>

    <!-- PAGE 1 -->
    <div id="page1">
        <h2>Select Your Current Floor</h2>

        <button onclick="setCurrent('1')">Floor 1</button><br>
        <button onclick="setCurrent('2')">Floor 2</button><br>
        <button onclick="setCurrent('3')">Floor 3</button><br>
        <button onclick="setCurrent('4')">Floor 4</button>
    </div>

    <!-- PAGE 2 -->
    <div id="page2" class="hidden">
        <h2>Select Destination Floor</h2>

        <button onclick="sendData('1')">Floor 1</button><br>
        <button onclick="sendData('2')">Floor 2</button><br>
        <button onclick="sendData('3')">Floor 3</button><br>
        <button onclick="sendData('4')">Floor 4</button>
    </div>

    <script>
        let currentFloor = "";

        function setCurrent(floor) {
            currentFloor = floor;

            document.getElementById("page1").classList.add("hidden");
            document.getElementById("page2").classList.remove("hidden");
        }

        function sendData(destination) {
            fetch(`http://192.168.4.1/move?from=${currentFloor}&to=${destination}`)
            .then(() => alert("Lift moving from Floor " + currentFloor + " to Floor " + destination))
            .catch(() => alert("Error connecting to ESP32"));
        }
    </script>

</body>
</html>
